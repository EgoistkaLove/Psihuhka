<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>HIKKU SYSTEM</title>

<!-- ПОДСКАЗКИ -->
<!-- password: 7391 -->
<!-- binary: 01101000 01101001 01101011 01101011 01110101 -->

<style>
body { margin:0; background:black; color:#00ff88; font-family:monospace; }
#terminal { padding:20px; height:90vh; overflow-y:auto; }
input { width:100%; padding:10px; background:black; border:none; color:#00ff88; }

#timer { position:fixed; top:10px; right:20px; color:red; }

.glitch { animation: glitch 0.2s infinite; }
@keyframes glitch {
  0%{transform:translate(2px,-2px)}
  50%{transform:translate(-2px,2px)}
  100%{transform:translate(2px,-2px)}
}
</style>
</head>

<body>

<div id="timer">⏳ 180</div>
<div id="terminal"></div>
<input id="cmd" autofocus>

<audio id="type" src="https://zvukipro.com/uploads/files/2019-07/1564068640_cf9b99726102246.mp3"></audio>
<audio id="error" src="https://zvukipro.com/uploads/files/2019-06/1561356682_beep-08b.mp3"></audio>

<script>
const term = document.getElementById("terminal");
const input = document.getElementById("cmd");
const timerEl = document.getElementById("timer");

let level = 0;
let time = 180;

// СЮЖЕТ
print("Запуск...");
setTimeout(()=>print("Подключение к серверу..."),1000);
setTimeout(()=>print("Darczanro: ты слышишь меня?"),2000);
setTimeout(()=>print("Darczanro: я застрял..."),3000);
setTimeout(()=>print("Darczanro: найди меня"),4000);

// УРОВНИ (10)
const levels = [
  {q:"Введите пароль (в коде)", a:"7391"},
  {q:"Бинарный код (в коде)", a:"hikku"},
  {q:"Морзе: .... .. -.- -.- ..-", a:"hikku"},
  {q:"10х+9=7x", a:"-3"},
  {q:"Реверс: Phiytsicoc epsel", a:"Psychotic sleep"},
  {q:"Base64: aGlra3U=", a:"hikky"},
  {q:"Напиши 'я здесь'", a:"я здесь"},
  {q:"Команда выхода?", a:"exit"},
  {q:"Ты поможешь? (да/нет)", a:"да"},
  {q:"Открой hidden.html", a:"open"}
];

// ТАЙМЕР
setInterval(()=>{
  time--;
  timerEl.innerText="⏳ "+time;

  if(time<30){
    document.body.classList.add("glitch");
    creepy();
  }

  if(time<=0){
    fail();
  }
},1000);

function print(t){
  let d=document.createElement("div");
  d.innerText=t;
  term.appendChild(d);
  term.scrollTop=term.scrollHeight;
}

print(levels[0].q);

// ВВОД
input.addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    document.getElementById("type").play();
    let cmd=input.value.toLowerCase();
    print("> "+cmd);
    handle(cmd);
    input.value="";
  }
});

function handle(cmd){

  if(level===9 && cmd==="open"){
    window.location.href="hidden.html"; // ПЕРЕХОД
    return;
  }

  if(cmd===levels[level].a){
    level++;

    if(level>=levels.length){
      print("Darczanro: ты нашел путь...");
    } else {
      print(levels[level].q);
    }

  } else {
    document.getElementById("error").play();
    print("Ошибка...");
    fakeHack();
  }
}

// ФЕЙК ВЗЛОМ
function fakeHack(){
  if(Math.random()>0.5){
    print("⚠ доступ извне...");
    print("они наблюдают");
    document.body.classList.add("glitch");
    setTimeout(()=>document.body.classList.remove("glitch"),500);
  }
}

// СЛЕЖКА
function creepy(){
  if(Math.random()>0.7){
    print("я тебя вижу");
  }
}

// ПРОИГРЫШ
function fail(){
  document.body.innerHTML=`
  <div style="color:red;text-align:center;margin-top:20%">
  💀 Хикка не проснулся, отчеты съели его заживо
  </div>
  `;
}
</script>

</body>
</html>
